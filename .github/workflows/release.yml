name: Auto Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same branch
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    # Skip commits made by this workflow (version bump). workflow_dispatch always runs.
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build foundry-module
        run: npm run build -w packages/foundry-module

      - name: Bump version
        id: version
        run: |
          CURRENT=$(jq -r '.version' packages/foundry-module/module.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping version: $CURRENT → $NEW_VERSION"
          jq --arg v "$NEW_VERSION" '.version = $v' packages/foundry-module/module.json > tmp.json
          mv tmp.json packages/foundry-module/module.json

      - name: Create release ZIP
        run: |
          mkdir -p release-staging
          cp packages/foundry-module/module.json release-staging/
          cp -r packages/foundry-module/dist release-staging/
          cd release-staging
          zip -r ../foundry-mcp-patoko.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new }}
          name: v${{ steps.version.outputs.new }}
          generate_release_notes: true
          files: foundry-mcp-patoko.zip

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/foundry-module/module.json
          git diff --cached --quiet || \
            git commit -m "chore: bump module version to ${{ steps.version.outputs.new }} [skip ci]" && \
            git push
